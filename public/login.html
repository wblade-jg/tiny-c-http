<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Biblioteca G03 - Iniciar sesión</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/estilo.css" />
  </head>

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-sm-10 mt-3">

        <div class="card">
          <!-- ENCABEZADO -->
          <div class="card-header-custom">
            <i class="bi bi-book-half"></i>
            <h4 class="mb-0 mt-2 fw-bold">Sistema de Biblioteca</h4>
            <span class="badge-sistema">G03 · SOF-S-MA-6-3</span>
          </div>

          <!-- FORMULARIO -->
          <div class="card-body p-4">
            <h5 class="text-center text-secondary mb-4">
              <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
            </h5>

            <div class="alert alert-danger alerta-error" id="alertaError">
              <i class="bi bi-exclamation-circle me-1"></i>
              Usuario o contraseña incorrectos.
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Usuario</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <!-- CORRECCIÓN: eliminado el id duplicado que había en este input -->
                <input type="password" class="form-control with-btn" id="contrasena"
                  placeholder="Ingrese su contraseña">
                <button class="btn btn-outline-secondary" type="button" id="btnVerPass"
                  style="border-radius: 0 10px 10px 0;">
                  <i class="bi bi-eye" id="iconoOjo"></i>
                </button>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button class="btn btn-primary" onclick="iniciarSesion()">
                <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
              </button>
            </div>

            <hr class="my-3">

            <p class="text-center text-muted mb-0" style="font-size: 0.9rem;">
              ¿No tienes cuenta?
              <a href="registro.html" class="link-registro">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-0">
        &copy; 2026 Sistema de Gestión de Préstamos - Biblioteca G03
        (Proyecto UG Web).
      </p>
    </div>
  </footer>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mostrar/ocultar contraseña
        document.getElementById('btnVerPass').addEventListener('click', function () {
            const input = document.getElementById('contrasena');
            const icono = document.getElementById('iconoOjo');
            if (input.type === 'password') {
                input.type = 'text';
                icono.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icono.className = 'bi bi-eye';
            }
        });

        function iniciarSesion() {
            const usuario = document.getElementById('usuario').value.trim();
            const contrasena = document.getElementById('contrasena').value.trim();
            const alerta = document.getElementById('alertaError');

            // Validar campos vacíos
            if (usuario === '' || contrasena === '') {
                alerta.style.display = 'block';
                alerta.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i> Complete todos los campos.';
                return;
            }

            const usuarioGuardado = localStorage.getItem('usuario_username');
            const contrasenaGuardada = localStorage.getItem('usuario_contrasena');

            if (usuarioGuardado === null) {
                alerta.style.display = 'block';
                alerta.innerHTML = '<i class="bi bi-person-x me-1"></i> Usuario no registrado. <a href="registro.html" class="alert-link">Crear cuenta</a>';
                return;
            }

            if (usuario !== usuarioGuardado) {
                alerta.style.display = 'block';
                alerta.innerHTML = '<i class="bi bi-person-x me-1"></i> Usuario no registrado. <a href="registro.html" class="alert-link">Crear cuenta</a>';
                return;
            }

            if (contrasena !== contrasenaGuardada) {
                alerta.style.display = 'block';
                alerta.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i> Contraseña incorrecta.';
                return;
            }

            // Login exitoso
            alerta.style.display = 'none';

            window.location.href = 'libros.html';
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') iniciarSesion();
        });
    </script>
</body>

</html>
