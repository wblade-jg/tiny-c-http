<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Biblioteca G03 - Registrarse</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/estilo.css" />
  </head>

  <body>
  <div class="container">
      <div class="row justify-content-center">
    <div class="col-md-7 col-sm-11 mt-3">
          <div class="card">
      <!-- ENCABEZADO -->
      <div class="card-header-custom">
              <i class="bi bi-person-plus-fill"></i>
              <h4 class="mb-0 mt-2 fw-bold">Crear cuenta</h4>
              <span class="badge-sistema">Sistema de Biblioteca · G03</span>
      </div>

      <!-- FORMULARIO -->
      <div class="card-body p-4">
              <div id="alertaRegistro" class="alert d-none" role="alert"></div>

              <!-- DATOS PERSONALES -->
              <div class="seccion-form">
        <p class="paso-titulo">
                  <i class="bi bi-person-lines-fill me-1"></i>Datos personales
        </p>
        <div class="row">
                  <div class="col-md-6 mb-3">
          <label class="form-label">Nombre</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-person"></i
                      ></span>
                      <input
            type="text"
            class="form-control"
            id="nombre"
            placeholder="Ingrese su nombre"
                      />
          </div>
                  </div>
                  <div class="col-md-6 mb-3">
          <label class="form-label">Apellido</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-person"></i
                      ></span>
                      <input
            type="text"
            class="form-control"
            id="apellido"
            placeholder="Ingrese su apellido"
                      />
          </div>
                  </div>
        </div>
              </div>

              <!-- DATOS DE CUENTA -->
              <div class="seccion-form">
        <p class="paso-titulo">
                  <i class="bi bi-shield-lock me-1"></i>Datos de cuenta
        </p>
        <div class="mb-3">
                  <label class="form-label">Correo electrónico</label>
                  <div class="input-group">
          <span class="input-group-text"
                      ><i class="bi bi-envelope"></i
          ></span>
          <input
                      type="email"
                      class="form-control"
                      id="correo"
                      placeholder="ejemplo@correo.com"
          />
                  </div>
        </div>
        <div class="mb-3">
                  <label class="form-label">Nombre de usuario</label>
                  <div class="input-group">
          <span class="input-group-text"
                      ><i class="bi bi-at"></i
          ></span>
          <input
                      type="text"
                      class="form-control"
                      id="username"
                      placeholder="Cree un nombre de usuario"
          />
                  </div>
        </div>
        <div class="row">
                  <div class="col-md-6 mb-3">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-lock"></i
                      ></span>
                      <input
            type="password"
            class="form-control with-btn"
            id="contrasena"
            placeholder="Mínimo 6 caracteres"
                      />
                      <button
            class="btn btn-outline-secondary"
            type="button"
            id="btnVer1"
            style="border-radius: 0 10px 10px 0"
                      >
            <i class="bi bi-eye" id="ojo1"></i>
                      </button>
          </div>
          <!-- CORRECCIÓN: barra de fuerza + reglas en tiempo real -->
          <div class="password-strength-bar" id="strengthBar"></div>
          <div class="strength-hint" id="strengthHint"></div>
          <ul class="pwd-rules" id="pwdRules">
                      <li id="rule-len">
            <i class="bi bi-x-circle"></i>Mínimo 6 caracteres
                      </li>
                      <li id="rule-upper">
            <i class="bi bi-x-circle"></i>Al menos una mayúscula
                      </li>
                      <li id="rule-num">
            <i class="bi bi-x-circle"></i>Al menos un número
                      </li>
          </ul>
                  </div>
                  <div class="col-md-6 mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-lock-fill"></i
                      ></span>
                      <input
            type="password"
            class="form-control with-btn"
            id="confirmar"
            placeholder="Repita la contraseña"
                      />
                      <button
            class="btn btn-outline-secondary"
            type="button"
            id="btnVer2"
            style="border-radius: 0 10px 10px 0"
                      >
            <i class="bi bi-eye" id="ojo2"></i>
                      </button>
          </div>
          <!-- Indicador de coincidencia en tiempo real -->
          <div class="strength-hint" id="matchHint"></div>
                  </div>
        </div>
              </div>

              <div class="d-grid mt-2">
        <button class="btn btn-primary" onclick="registrar()">
                  <i class="bi bi-person-check me-1"></i> Crear cuenta
        </button>
              </div>

              <hr class="my-3" />
              <p class="text-center text-muted mb-0" style="font-size: 0.9rem">
        ¿Ya tienes cuenta?
        <a href="login.html" class="link-login">Inicia sesión aquí</a>
              </p>
      </div>
          </div>
    </div>
      </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
      <div class="container">
    <p class="mb-0">
          &copy; 2026 Sistema de Gestión de Préstamos - Biblioteca G03 (Proyecto
          UG Web).
    </p>
      </div>
  </footer>


    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ── Toggle visibilidad contraseñas ──
      function togglePass(btnId, inputId, iconId) {
        document.getElementById(btnId).addEventListener("click", function () {
          const input = document.getElementById(inputId);
          const icono = document.getElementById(iconId);
          if (input.type === "password") {
            input.type = "text";
            icono.className = "bi bi-eye-slash";
          } else {
            input.type = "password";
            icono.className = "bi bi-eye";
          }
        });
      }
      togglePass("btnVer1", "contrasena", "ojo1");
      togglePass("btnVer2", "confirmar", "ojo2");

      // ── CORRECCIÓN: feedback en tiempo real de la contraseña ──
      document
        .getElementById("contrasena")
        .addEventListener("input", function () {
          const val = this.value;
          evaluarContrasena(val);
        });

      // También verificar coincidencia mientras escribe en confirmar
      document
        .getElementById("confirmar")
        .addEventListener("input", function () {
          const pass = document.getElementById("contrasena").value;
          const confirm = this.value;
          const hint = document.getElementById("matchHint");

          if (confirm === "") {
            hint.textContent = "";
            hint.className = "strength-hint";
            return;
          }
          if (pass === confirm) {
            hint.textContent = "✔ Las contraseñas coinciden";
            hint.className = "strength-hint text-success";
          } else {
            hint.textContent = "✖ Las contraseñas no coinciden";
            hint.className = "strength-hint text-danger";
          }
        });

      function evaluarContrasena(val) {
        const bar = document.getElementById("strengthBar");
        const hint = document.getElementById("strengthHint");

        const ruleLen = document.getElementById("rule-len");
        const ruleUpper = document.getElementById("rule-upper");
        const ruleNum = document.getElementById("rule-num");

        const hasLen = val.length >= 6;
        const hasUpper = /[A-Z]/.test(val);
        const hasNum = /[0-9]/.test(val);

        // Actualizar íconos de reglas
        setRule(ruleLen, hasLen);
        setRule(ruleUpper, hasUpper);
        setRule(ruleNum, hasNum);

        // Calcular puntaje de fuerza
        const score = [hasLen, hasUpper, hasNum].filter(Boolean).length;

        if (val === "") {
          bar.style.width = "0%";
          bar.style.backgroundColor = "transparent";
          hint.textContent = "";
          return;
        }

        const niveles = [
          { width: "33%", color: "#dc3545", label: "Débil" },
          { width: "66%", color: "#ffc107", label: "Regular" },
          { width: "100%", color: "#198754", label: "Fuerte" },
        ];

        const nivel = niveles[score - 1] || niveles[0];
        bar.style.width = nivel.width;
        bar.style.backgroundColor = nivel.color;
        hint.textContent = `Contraseña: ${nivel.label}`;
        hint.style.color = nivel.color;
      }

      function setRule(el, ok) {
        if (ok) {
          el.classList.add("ok");
          el.querySelector("i").className = "bi bi-check-circle";
        } else {
          el.classList.remove("ok");
          el.querySelector("i").className = "bi bi-x-circle";
        }
      }

      function mostrarAlerta(mensaje, tipo) {
        const alerta = document.getElementById("alertaRegistro");
        alerta.className = `alert alert-${tipo}`;
        alerta.innerHTML = `<i class="bi bi-${tipo === "danger" ? "exclamation-circle" : "check-circle"} me-1"></i> ${mensaje}`;
        alerta.classList.remove("d-none");
      }

      // ── Registrar usuario ──
      function registrar() {
        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const correo = document.getElementById("correo").value.trim();
        const username = document.getElementById("username").value.trim();
        const contrasena = document.getElementById("contrasena").value.trim();
        const confirmar = document.getElementById("confirmar").value.trim();

        if (
          !nombre ||
          !apellido ||
          !correo ||
          !username ||
          !contrasena ||
          !confirmar
        ) {
          mostrarAlerta("Complete todos los campos.", "danger");
          return;
        }

        if (contrasena.length < 6) {
          mostrarAlerta(
            "La contraseña debe tener al menos 6 caracteres.",
            "danger",
          );
          return;
        }

        if (contrasena !== confirmar) {
          mostrarAlerta("Las contraseñas no coinciden.", "danger");
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(correo)) {
          mostrarAlerta("Ingrese un correo electrónico válido.", "danger");
          return;
        }

        // Guardar en localStorage
        localStorage.setItem("usuario_nombre", nombre);
        localStorage.setItem("usuario_apellido", apellido);
        localStorage.setItem("usuario_correo", correo);
        localStorage.setItem("usuario_username", username);
        localStorage.setItem("usuario_contrasena", contrasena);

        mostrarAlerta(
          "¡Cuenta creada exitosamente! Redirigiendo...",
          "success",
        );

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1800);
      }
    </script>
  </body>
</html>
