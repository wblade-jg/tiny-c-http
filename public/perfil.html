<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Biblioteca G03 - Mi Perfil</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/estilo.css" />
  </head>

  <body>
  <!-- HEADER -->
  <header class="navbar bg-primary align-items-center px-3 shadow-sm mb-3">
      <div class="container">
    <div class="d-flex align-items-center">
          <button
      class="btn text-white fs-5"
      data-bs-toggle="offcanvas"
      data-bs-target="#sidebarMenu"
          >
      <i class="bi bi-list"></i>
          </button>
          <h6 class="fw-bold text-white mb-0">Biblioteca G03</h6>
    </div>
    <div class="dropdown">
          <button
      class="btn dropdown-toggle align-items-center text-white"
      data-bs-toggle="dropdown"
          >
      <i class="bi bi-person-circle me-2"></i>
      <span id="username" class="fw-bold">Julian Garzón</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="perfil.html">Mi Perfil</a></li>
      <li>
              <a class="dropdown-item text-danger fw-bold" href="login.html">
        <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión</a
              >
      </li>
          </ul>
    </div>
      </div>
  </header>
  <!-- CONTENIDO -->
  <div class="container">
      <div class="row justify-content-center">
    <div class="col-md-7 col-sm-11">
          <div class="card">
      <div class="card-body p-4">
              <!-- AVATAR Y NOMBRE -->
              <div class="text-center mb-3">
        <div class="avatar-wrapper">
                  <div class="avatar-placeholder" id="avatarPlaceholder">
          <i class="bi bi-person-fill"></i>
                  </div>
                  <img
          src=""
          id="avatarImg"
          class="avatar-img d-none"
          alt="Foto de perfil"
                  />
                  <label class="btn-foto" for="inputFoto" title="Cambiar foto">
          <i class="bi bi-camera-fill"></i>
                  </label>
                  <input
          type="file"
          id="inputFoto"
          accept="image/*"
          class="d-none"
                  />
        </div>
        <h5 class="fw-bold mb-1" id="nombreMostrado">Usuario</h5>
        <span class="badge-rol">
                  <i class="bi bi-person-badge me-1"></i> Lector
        </span>
              </div>

              <div id="alertaPerfil" class="alert d-none" role="alert"></div>

              <!-- DATOS PERSONALES -->
              <div class="seccion-form">
        <p class="paso-titulo">
                  <i class="bi bi-person-lines-fill me-1"></i>Datos personales
        </p>
        <div class="row">
                  <div class="col-md-6 mb-3">
          <label class="form-label">Nombre</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-person"></i
                      ></span>
                      <input
            type="text"
            class="form-control"
            id="nombre"
            placeholder="Nombre"
                      />
          </div>
                  </div>
                  <div class="col-md-6 mb-3">
          <label class="form-label">Apellido</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-person"></i
                      ></span>
                      <input
            type="text"
            class="form-control"
            id="apellido"
            placeholder="Apellido"
                      />
          </div>
                  </div>
        </div>
              </div>

              <!-- DATOS DE CUENTA -->
              <div class="seccion-form">
        <p class="paso-titulo">
                  <i class="bi bi-shield-lock me-1"></i>Datos de cuenta
        </p>
        <div class="mb-3">
                  <label class="form-label">Correo electrónico</label>
                  <div class="input-group">
          <span class="input-group-text"
                      ><i class="bi bi-envelope"></i
          ></span>
          <input
                      type="email"
                      class="form-control"
                      id="correo"
                      placeholder="correo@ejemplo.com"
          />
                  </div>
        </div>
        <div class="mb-3">
                  <label class="form-label">Nombre de usuario</label>
                  <div class="input-group">
          <span class="input-group-text"
                      ><i class="bi bi-at"></i
          ></span>
          <input
                      type="text"
                      class="form-control"
                      id="username"
                      placeholder="Nombre de usuario"
          />
                  </div>
        </div>
              </div>

              <!-- CAMBIAR CONTRASEÑA -->
              <div class="seccion-form">
        <p class="paso-titulo">
                  <i class="bi bi-key me-1"></i>Cambiar contraseña
        </p>
        <div class="mb-3">
                  <label class="form-label">Contraseña actual</label>
                  <div class="input-group">
          <span class="input-group-text"
                      ><i class="bi bi-lock"></i
          ></span>
          <input
                      type="password"
                      class="form-control"
                      id="passActual"
                      placeholder="Ingrese la contraseña actual"
          />
          <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="btnVer1"
                      style="border-radius: 0 10px 10px 0"
          >
                      <i class="bi bi-eye" id="ojo1"></i>
          </button>
                  </div>
        </div>
        <div class="row">
                  <div class="col-md-6 mb-3">
          <label class="form-label">Nueva contraseña</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-lock-fill"></i
                      ></span>
                      <input
            type="password"
            class="form-control"
            id="passNueva"
            placeholder="Nueva contraseña"
                      />
                      <button
            class="btn btn-outline-secondary"
            type="button"
            id="btnVer2"
            style="border-radius: 0 10px 10px 0"
                      >
            <i class="bi bi-eye" id="ojo2"></i>
                      </button>
          </div>
                  </div>
                  <div class="col-md-6 mb-3">
          <label class="form-label">Confirmar nueva contraseña</label>
          <div class="input-group">
                      <span class="input-group-text"
            ><i class="bi bi-lock-fill"></i
                      ></span>
                      <input
            type="password"
            class="form-control"
            id="passConfirmar"
            placeholder="Confirmar contraseña"
                      />
                      <button
            class="btn btn-outline-secondary"
            type="button"
            id="btnVer3"
            style="border-radius: 0 10px 10px 0"
                      >
            <i class="bi bi-eye" id="ojo3"></i>
                      </button>
          </div>
                  </div>
        </div>
        <small class="text-muted">
                  <i class="bi bi-info-circle me-1"></i>
                  Deje estos campos vacíos si no desea cambiar la contraseña.
        </small>
              </div>

              <!-- BOTONES -->
              <div class="d-flex gap-2 mt-3">
        <button
                  class="btn btn-primary flex-grow-1"
                  onclick="guardarCambios()"
        >
                  <i class="bi bi-floppy me-1"></i> Guardar cambios
        </button>
        <button class="btn btn-outline-secondary" onclick="cancelar()">
                  <i class="bi bi-x-lg me-1"></i> Cancelar
        </button>
              </div>
      </div>
          </div>
    </div>
      </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
      <div class="container">
    <p class="mb-0">
          &copy; 2026 Sistema de Gestión de Préstamos - Biblioteca G03 (Proyecto
          UG Web).
    </p>
      </div>
  </footer>

  <!-- SIDEBAR -->
  <div class="offcanvas offcanvas-start" id="sidebarMenu">
      <div class="offcanvas-header border-bottom">
    <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
    ></button>
      </div>

      <div class="offcanvas-body p-0">
    <div class="list-group list-group-flush">
          <a href="index.html" class="list-group-item list-group-item-action py-3">
      <i class="bi bi-house-door me-2"></i> Inicio
          </a>
          <a
      href="libros.html"
      class="list-group-item list-group-item-action py-3"
          >
      <i class="bi bi-book me-2"></i> Libros
          </a>
          <a
      href="prestamos.html"
      class="list-group-item list-group-item-action py-3"
          >
      <i class="bi bi-arrow-left-right me-2"></i> Préstamos
          </a>
          <a
      href="reportes.html"
      class="list-group-item list-group-item-action py-3"
          >
      <i class="bi bi-bar-chart-fill me-2"></i> Reportes
          </a>
    </div>
      </div>
  </div>


    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const usuarioGuardado = localStorage.getItem("usuario_username");
      const campoNombre = document.getElementById("username");

      campoNombre.innerText = usuarioGuardado || "Usuario";

      // Cargar datos del localStorage (simulados desde registro)
      window.addEventListener("load", function () {
        document.getElementById("nombre").value =
          localStorage.getItem("usuario_nombre") || "Paola";
        document.getElementById("apellido").value =
          localStorage.getItem("usuario_apellido") || "Tapia";
        document.getElementById("correo").value =
          localStorage.getItem("usuario_correo") || "paola@correo.com";
        document.getElementById("username").value =
          localStorage.getItem("usuario_username") || "paola.tapia";
        actualizarNombreMostrado();
      });

      function actualizarNombreMostrado() {
        const nombre = document.getElementById("nombre").value;
        const apellido = document.getElementById("apellido").value;
        document.getElementById("nombreMostrado").textContent =
          (nombre + " " + apellido).trim() || "Usuario";
      }

      // Mostrar/ocultar contraseñas
      function togglePass(btnId, inputId, iconId) {
        document.getElementById(btnId).addEventListener("click", function () {
          const input = document.getElementById(inputId);
          const icono = document.getElementById(iconId);
          input.type = input.type === "password" ? "text" : "password";
          icono.className =
            input.type === "text" ? "bi bi-eye-slash" : "bi bi-eye";
        });
      }
      togglePass("btnVer1", "passActual", "ojo1");
      togglePass("btnVer2", "passNueva", "ojo2");
      togglePass("btnVer3", "passConfirmar", "ojo3");

      // Cambiar foto de perfil
      document
        .getElementById("inputFoto")
        .addEventListener("change", function () {
          const file = this.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (e) {
            const img = document.getElementById("avatarImg");
            img.src = e.target.result;
            img.classList.remove("d-none");
            document
              .getElementById("avatarPlaceholder")
              .classList.add("d-none");
          };
          reader.readAsDataURL(file);
        });

      function mostrarAlerta(mensaje, tipo) {
        const alerta = document.getElementById("alertaPerfil");
        alerta.className = `alert alert-${tipo}`;
        alerta.innerHTML = `<i class="bi bi-${tipo === "danger" ? "exclamation-circle" : "check-circle"} me-1"></i> ${mensaje}`;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 3500);
      }

      function guardarCambios() {
        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const correo = document.getElementById("correo").value.trim();
        const username = document.getElementById("username").value.trim();
        const passActual = document.getElementById("passActual").value.trim();
        const passNueva = document.getElementById("passNueva").value.trim();
        const passConfirmar = document
          .getElementById("passConfirmar")
          .value.trim();

        if (!nombre || !apellido || !correo || !username) {
          mostrarAlerta("Complete los campos obligatorios.", "danger");
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(correo)) {
          mostrarAlerta("Ingrese un correo electrónico válido.", "danger");
          return;
        }

        if (passActual || passNueva || passConfirmar) {
          const passGuardada =
            localStorage.getItem("usuario_contrasena") || "1234";
          if (passActual !== passGuardada) {
            mostrarAlerta("La contraseña actual es incorrecta.", "danger");
            return;
          }
          if (passNueva.length < 6) {
            mostrarAlerta(
              "La nueva contraseña debe tener al menos 6 caracteres.",
              "danger",
            );
            return;
          }
          if (passNueva !== passConfirmar) {
            mostrarAlerta("Las contraseñas nuevas no coinciden.", "danger");
            return;
          }
          localStorage.setItem("usuario_contrasena", passNueva);
          document.getElementById("passActual").value = "";
          document.getElementById("passNueva").value = "";
          document.getElementById("passConfirmar").value = "";
        }

        localStorage.setItem("usuario_nombre", nombre);
        localStorage.setItem("usuario_apellido", apellido);
        localStorage.setItem("usuario_correo", correo);
        localStorage.setItem("usuario_username", username);

        actualizarNombreMostrado();
        mostrarAlerta("¡Datos actualizados correctamente!", "success");
        setTimeout(() => {
          window.location.href = "libros.html";
        }, 1500);
      }

      function cancelar() {
        window.location.href = "libros.html";
      }

      function cerrarSesion() {
        if (confirm("¿Deseas cerrar sesión?")) {
          window.location.href = "login.html";
        }
      }
    </script>
  </body>
</html>
